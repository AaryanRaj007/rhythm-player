name: rhythm
description: "A beautiful local music player for Android"
publish_to: 'none'
version: 1.0.0+1

environment:
  sdk: ^3.6.0

dependencies:
  flutter:
    sdk: flutter
  permission_handler: ^11.0.0
  on_audio_query: ^2.9.0
  just_audio: ^0.9.36
  audio_session: ^0.1.18
  google_fonts: ^8.0.0
  flutter_animate: ^4.3.0
  shared_preferences: ^2.2.2
  marquee: ^2.2.3
  rxdart: ^0.27.7
  provider: ^6.1.1
  device_info_plus: ^10.1.0
  just_audio_background: ^0.0.1-beta.17
  file_picker: ^8.1.5

dev_dependencies:
  flutter_test:
    sdk: flutter
  flutter_lints: ^5.0.0
  flutter_launcher_icons: ^0.14.1

flutter_launcher_icons:
  android: true
  ios: false
  image_path: "logo.png"
  min_sdk_android: 21
  adaptive_icon_background: "#0A0E21"
  adaptive_icon_foreground: "logo.png"

flutter:
  uses-material-design: true
